services:
  - type: web
    name: actual-data-token-checker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_web.py --host 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: WEB_TRUST_PROXY
        value: "1"
      # RugWatch cloud list (flagged wallets in Holders + Alerts)
      - key: RUGWATCH_WALLETS_URL
        value: "https://raw.githubusercontent.com/Greenwolf30/RugWatch/main/data/wallets_index.json"
      # Live RugWatch site — Local DB count/match when ATC has no on-disk SQLite
      - key: RUGWATCH_URL
        value: "https://rugwatch.onrender.com"
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
