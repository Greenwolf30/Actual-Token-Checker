# Backend API only (keys live here as Render env vars — never on Netlify/Vercel).
# After deploy, set web/config.js apiBase to this service URL and redeploy the static UI.

services:
  - type: web
    name: adtc-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_web.py --host 0.0.0.0 --port $PORT
    envVars:
      - key: WEB_API_TOKEN
        generateValue: true
      - key: WEB_CORS_ORIGINS
        sync: false
        # Set to https://your-site.netlify.app
      - key: WEB_TRUST_PROXY
        value: "1"
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
