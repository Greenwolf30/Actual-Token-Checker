services:
  - type: web
    name: actual-data-token-checker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_web.py --host 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: WEB_TRUST_PROXY
        value: "1"
      - key: HELIUS_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
