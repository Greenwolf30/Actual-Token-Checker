<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>Documentation — Actual Data Token Checker</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .docs-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }
    .docs-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .docs-top h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }
    .docs-top p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .docs-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .docs-actions a {
      display: inline-block;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .docs-actions a:hover {
      border-color: var(--accent-border);
      color: var(--text);
      background: var(--accent-soft);
    }
    .docs-actions a.primary {
      border-color: var(--accent-border);
      background: var(--accent-soft);
      color: var(--accent);
    }
    .docs-body {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      box-shadow: var(--shadow);
      overflow: auto;
      max-height: none;
    }
    .docs-body pre {
      margin: 0;
      padding: 18px 16px 28px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.55;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .docs-status {
      margin: 12px 0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .docs-status.err { color: var(--bad); }
  </style>
</head>
<body>
  <div class="docs-page">
    <nav class="site-nav site-nav-compact" aria-label="Main" style="margin-bottom: 16px;">
      <div class="site-nav-inner">
        <a class="nav-brand nav-brand-icon" href="/" title="Home">
          <img class="logo logo-sm" src="/logo.svg" width="28" height="28" alt="Home" />
        </a>
        <div class="nav-links">
          <a class="nav-link" href="/">Analyze</a>
          <a class="nav-link" href="/docs.html" aria-current="page">Docs</a>
          <a
            class="nav-link"
            href="https://github.com/Greenwolf30/Actual-Token-Checker"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub</a
          >
        </div>
      </div>
    </nav>

    <div class="docs-top">
      <div>
        <h1>Actual Data Token Checker — User Guide</h1>
        <p>
          Loads the <strong>Actual Token Checker</strong> user guide
          (<code>web/documentation.txt</code> on this host, same as
          <code>DOCUMENTATION.txt</code> in the GitHub repo).
        </p>
      </div>
      <div class="docs-actions">
        <a class="primary" href="/">← Back to Analyze</a>
        <a href="/documentation.txt" target="_blank" rel="noopener">Raw .txt</a>
        <a
          href="https://github.com/Greenwolf30/Actual-Token-Checker/blob/main/DOCUMENTATION.txt"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub DOCUMENTATION.txt</a
        >
      </div>
    </div>

    <p id="docsStatus" class="docs-status">Loading Token Checker documentation…</p>
    <div class="docs-body">
      <pre id="docsContent"></pre>
    </div>
  </div>

  <script>
    (async function () {
      const status = document.getElementById("docsStatus");
      const pre = document.getElementById("docsContent");
      // Prefer this site's copy; fall back to GitHub so Docs still works
      // if the deploy is missing the file or the free host is cold-starting badly.
      const sources = [
        { url: "/documentation.txt", label: "this website (/documentation.txt)" },
        { url: "/DOCUMENTATION.txt", label: "this website (/DOCUMENTATION.txt)" },
        {
          url:
            "https://raw.githubusercontent.com/Greenwolf30/Actual-Token-Checker/main/DOCUMENTATION.txt",
          label: "GitHub raw DOCUMENTATION.txt (fallback)",
        },
      ];
      let lastErr = null;
      for (const src of sources) {
        try {
          const r = await fetch(src.url, {
            cache: "no-cache",
            credentials: src.url.startsWith("/") ? "same-origin" : "omit",
          });
          if (!r.ok) throw new Error("HTTP " + r.status);
          const text = await r.text();
          if (!text || text.length < 200) {
            throw new Error("file too short / empty");
          }
          // Reject accidental HTML error pages
          if (/^\s*<(!doctype|html)/i.test(text)) {
            throw new Error("got HTML instead of plain-text guide");
          }
          pre.textContent = text;
          status.className = "docs-status";
          status.textContent =
            "Loaded Token Checker guide from " +
            src.label +
            " · " +
            text.length.toLocaleString() +
            " characters";
          return;
        } catch (e) {
          lastErr = e;
        }
      }
      status.className = "docs-status err";
      status.textContent =
        "Could not load Token Checker documentation — " +
        (lastErr && lastErr.message ? lastErr.message : lastErr);
      pre.textContent =
        "The Docs page needs the Token Checker user guide.\n\n" +
        "Tried:\n" +
        "  1) /documentation.txt  (deployed from web/documentation.txt)\n" +
        "  2) /DOCUMENTATION.txt\n" +
        "  3) GitHub raw main/DOCUMENTATION.txt\n\n" +
        "Fix: ensure web/documentation.txt is in the deploy, or open GitHub:\n" +
        "https://github.com/Greenwolf30/Actual-Token-Checker/blob/main/DOCUMENTATION.txt\n";
    })();
  </script>
</body>
</html>
