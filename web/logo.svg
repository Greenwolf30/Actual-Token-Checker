<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Actual Data Token Checker">
  <defs>
    <linearGradient id="tile" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a2332"/>
      <stop offset="1" stop-color="#0d1219"/>
    </linearGradient>
    <linearGradient id="feather" x1="18" y1="48" x2="46" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8bb8ff"/>
      <stop offset="0.45" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#3d7aef"/>
    </linearGradient>
    <linearGradient id="quill" x1="28" y1="50" x2="36" y2="18" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c5d9f5"/>
      <stop offset="1" stop-color="#6ba3ff"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#tile)" stroke="#323a48" stroke-width="1.5"/>

  <!-- Feather body (tilted) -->
  <g transform="translate(32 33) rotate(-28) translate(-32 -33)">
    <!-- Outer vane outline -->
    <path
      d="M32 14
         C40 16 46 22 47 30
         C48 38 44 44 38 48
         C34 50.5 30 50.5 26 48
         C20 44 16 38 17 30
         C18 22 24 16 32 14 Z"
      fill="url(#feather)"
      opacity="0.92"
    />
    <!-- Inner soft highlight -->
    <path
      d="M32 17.5
         C38.5 19 43.2 23.5 44 30
         C44.8 36.5 41.5 41.5 36.5 45
         C33.5 47 30.5 47 27.5 45
         C22.5 41.5 19.2 36.5 20 30
         C20.8 23.5 25.5 19 32 17.5 Z"
      fill="#1a2840"
      opacity="0.22"
    />
    <!-- Shaft / rachis -->
    <path
      d="M32 16.5 L32 49.5"
      stroke="url(#quill)"
      stroke-width="1.8"
      stroke-linecap="round"
      opacity="0.95"
    />
    <!-- Barbs left -->
    <path d="M31.2 22 C27 23.5 24.5 26 23.5 29" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.55"/>
    <path d="M31.2 27 C26.5 28.5 23.8 31.5 23 35" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.5"/>
    <path d="M31.2 32 C27 33.5 24.8 36.5 24.2 40" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.45"/>
    <path d="M31.2 37 C28 38.2 26.2 40.5 25.8 43.5" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.4"/>
    <!-- Barbs right -->
    <path d="M32.8 22 C37 23.5 39.5 26 40.5 29" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.55"/>
    <path d="M32.8 27 C37.5 28.5 40.2 31.5 41 35" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.5"/>
    <path d="M32.8 32 C37 33.5 39.2 36.5 39.8 40" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.45"/>
    <path d="M32.8 37 C36 38.2 37.8 40.5 38.2 43.5" stroke="#dce8fa" stroke-width="1.15" stroke-linecap="round" opacity="0.4"/>
    <!-- Quill tip -->
    <path
      d="M32 49.5 L30.5 54.5 L32 53.2 L33.5 54.5 Z"
      fill="#8bb8ff"
      opacity="0.9"
    />
  </g>
</svg>
