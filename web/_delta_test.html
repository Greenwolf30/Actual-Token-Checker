<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ADTC delta unit test</title>
  <link rel="stylesheet" href="/styles.css?v=test" />
  <script>window.ADTC_CONFIG = { apiBase: "" };</script>
</head>
<body>
  <div id="bundlesUi" class="bundles-ui"></div>
  <pre id="text-bundles" hidden></pre>
  <div id="testOut" style="white-space:pre-wrap;font:14px monospace;padding:12px;background:#111;color:#eee"></div>
  <script src="/app.js?v=test"></script>
  <script>
    function log(s) {
      document.getElementById("testOut").textContent += s + "\n";
      console.log(s);
    }
    function makeData(totalPct, risk) {
      return {
        ok: true,
        token: { address: "So11111111111111111111111111111111111111112", chain_id: "solana" },
        market: { address: "So11111111111111111111111111111111111111112", chain_id: "solana" },
        bundles_view: {
          ok: true, method: "test", source: "test",
          token_address: "So11111111111111111111111111111111111111112",
          summary: {
            bundle_risk: "elevated", bundle_risk_score: risk,
            total_bundle_pct: totalPct, similar_size_total_pct: 1,
            fresh_total_pct: 0, multi_send_total_pct: 0, funding_total_pct: 0,
            suspect_total_pct: 0, single_holders_total_pct: 10,
            top10_pct_excluding_known_programs: 20,
            sources_used: ["test"], total_bundle_mode: "primary"
          },
          clusters: [], signals: [], similar_size_groups: [], insider_wallets: [],
          funding_clusters: [], fresh_wallets: [], multi_send_wallets: [],
          multi_send_clusters: [], sol_multi_send_clusters: [], suspect_wallets: []
        },
        sections: { bundles: "test" }
      };
    }
    function totalText() {
      var el = document.querySelector('.bun-stat[data-bun-stat="Total bundle"]');
      return el ? el.innerText : "";
    }
    window.__runDeltaTest = function () {
      var out = { ok: false, errors: [], version: window.__ADTC_CLIENT__ || null, steps: [] };
      try {
        if (typeof migrateBundleDeltaBaselines === "function") migrateBundleDeltaBaselines();
        try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
        if (typeof migrateBundleDeltaBaselines === "function") migrateBundleDeltaBaselines();

        renderBundlesUi(makeData(10, 30));
        var note = (document.getElementById("bunDeltaNote") || {}).textContent || "";
        var t1 = totalText();
        var hasPainted = /v96|Since last Analyze/i.test(note);
        var hasUp = /▲/.test(t1) && /\+10/.test(t1);
        out.steps.push({ step: "A", note: note, total: t1, hasPainted: hasPainted, hasUp: hasUp });
        if (!hasPainted) out.errors.push("A: banner missing DELTAS PAINTED: 9 — got: " + note);
        if (!hasUp) out.errors.push("A: total missing UP +10 — got: " + t1);
        var riskT = (document.querySelector('.bun-stat[data-bun-stat="Risk"]') || {}).innerText || "";
        if (!/\+30|▲ \+30|UP \+30/.test(riskT)) out.errors.push("A: risk should show +30 points, got: " + riskT.slice(0, 100));
        if (/\+30%/.test(riskT)) out.errors.push("A: risk delta must not use %, got: " + riskT.slice(0, 100));


        renderBundlesUi(makeData(25, 30));
        var t2 = totalText();
        var hasUp15 = /▲/.test(t2) && /\+15/.test(t2);
        out.steps.push({ step: "B", total: t2, hasUp15: hasUp15 });
        if (!hasUp15) out.errors.push("B: expected +15% movement — got: " + t2);

        renderBundlesUi(makeData(25, 30));
        var t3 = totalText();
        var has0 = /[·\u00b7]\s*0%|\(0%\)|0%/.test(t3) && !/[▲▼]/.test(t3);
        var hasMove = /[▲▼]/.test(t3);
        out.steps.push({ step: "C", total: t3, has0: has0, hasMove: hasMove });
        if (!has0) out.errors.push("C: expected (0%) when flat — got: " + t3);
        if (hasMove) out.errors.push("C: should not show UP/DN when flat");

        renderBundlesUi(makeData(12, 30));
        var t4 = totalText();
        var hasDn = /▼/.test(t4) && /13/.test(t4);
        out.steps.push({ step: "D", total: t4, hasDn: hasDn });
        if (!hasDn) out.errors.push("D: expected down move — got: " + t4);

        out.ok = out.errors.length === 0 && String(out.version).indexOf("v96") >= 0;
        if (String(out.version).indexOf("v96") < 0) {
          out.errors.push("need v96, got " + out.version);
          out.ok = false;
        }
      } catch (err) {
        out.errors.push(String(err && err.stack ? err.stack : err));
      }
      log(JSON.stringify(out, null, 2));
      window.__deltaTestResult = out;
      return out;
    };
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(function () { window.__runDeltaTest(); }, 50);
    });
  </script>
</body>
</html>
