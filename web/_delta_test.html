<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ADTC delta unit test</title>
  <link rel="stylesheet" href="/styles.css?v=test" />
  <script>window.ADTC_CONFIG = { apiBase: "" };</script>
</head>
<body>
  <div id="bundlesUi" class="bundles-ui"></div>
  <pre id="text-bundles" hidden></pre>
  <div id="testOut" style="white-space:pre-wrap;font:14px monospace;padding:12px;background:#111;color:#eee"></div>
  <script src="/app.js?v=test"></script>
  <script>
    function log(s) {
      document.getElementById("testOut").textContent += s + "\n";
      console.log(s);
    }
    function makeData(totalPct, risk) {
      return {
        ok: true,
        token: { address: "So11111111111111111111111111111111111111112", chain_id: "solana" },
        market: { address: "So11111111111111111111111111111111111111112", chain_id: "solana" },
        bundles_view: {
          ok: true, method: "test", source: "test",
          token_address: "So11111111111111111111111111111111111111112",
          summary: {
            bundle_risk: "elevated", bundle_risk_score: risk,
            total_bundle_pct: totalPct, similar_size_total_pct: 1,
            fresh_total_pct: 0, multi_send_total_pct: 0, funding_total_pct: 0,
            suspect_total_pct: 0, single_holders_total_pct: 10,
            top10_pct_excluding_known_programs: 20,
            sources_used: ["test"], total_bundle_mode: "primary"
          },
          clusters: [], signals: [], similar_size_groups: [], insider_wallets: [],
          funding_clusters: [], fresh_wallets: [], multi_send_wallets: [],
          multi_send_clusters: [], sol_multi_send_clusters: [], suspect_wallets: []
        },
        sections: { bundles: "test" }
      };
    }
    function totalChunk(text) {
      return (String(text).split("TOTAL BUNDLE")[1] || "").split("SIMILAR")[0] || "";
    }
    function countDeltas() {
      return document.querySelectorAll(".bun-stat-delta").length;
    }
    window.__runDeltaTest = function () {
      var out = { ok: false, errors: [], version: window.__ADTC_CLIENT__ || null, steps: [] };
      try {
        if (typeof migrateBundleDeltaBaselines === "function") migrateBundleDeltaBaselines();
        try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
        if (typeof migrateBundleDeltaBaselines === "function") migrateBundleDeltaBaselines();

        // A: 10% first → UP +10%, every box has a delta
        renderBundlesUi(makeData(10, 30));
        var t1 = document.getElementById("bundlesUi").innerText;
        var c1 = totalChunk(t1);
        var n1 = countDeltas();
        out.steps.push({ step: "A", up: /UP \+10/.test(c1), n: n1, sample: c1.slice(0, 80) });
        if (!/UP \+10/.test(c1)) out.errors.push("A: expected UP +10% on total");
        if (n1 < 9) out.errors.push("A: expected delta on every box, got " + n1);

        // B: 10→25 → UP +15%
        renderBundlesUi(makeData(25, 30));
        var c2 = totalChunk(document.getElementById("bundlesUi").innerText);
        var n2 = countDeltas();
        out.steps.push({ step: "B", up15: /UP \+15/.test(c2), n: n2, sample: c2.slice(0, 80) });
        if (!/UP \+15/.test(c2)) out.errors.push("B: expected UP +15%");
        if (n2 < 9) out.errors.push("B: expected 9 deltas, got " + n2);

        // C: 25→25 → green (0%) on total, still all boxes have deltas
        renderBundlesUi(makeData(25, 30));
        var c3 = totalChunk(document.getElementById("bundlesUi").innerText);
        var n3 = countDeltas();
        var flat3 = /\(0%\)/.test(c3) && !/UP |DN /.test(c3);
        var totalEl = document.querySelector('.bun-stat[data-bun-stat="Total bundle"] .bun-stat-delta');
        var green = totalEl && /bun-delta-green/.test(totalEl.className);
        out.steps.push({ step: "C", flat0: flat3, green: !!green, n: n3, sample: c3.slice(0, 80) });
        if (!flat3) out.errors.push("C: expected (0%) when unchanged, got: " + c3.slice(0, 60));
        if (!green) out.errors.push("C: expected green class on flat 0%");
        if (n3 < 9) out.errors.push("C: expected 9 deltas, got " + n3);

        // D: 25→12 → DN
        renderBundlesUi(makeData(12, 30));
        var c4 = totalChunk(document.getElementById("bundlesUi").innerText);
        var n4 = countDeltas();
        out.steps.push({ step: "D", dn: /DN /.test(c4), n: n4, sample: c4.slice(0, 80) });
        if (!/DN /.test(c4)) out.errors.push("D: expected DN when 25→12");
        if (n4 < 9) out.errors.push("D: expected 9 deltas, got " + n4);

        out.ok = out.errors.length === 0 && String(out.version).indexOf("v92") >= 0;
        if (String(out.version).indexOf("v92") < 0) {
          out.errors.push("need v92 got " + out.version);
          out.ok = false;
        }
      } catch (err) {
        out.errors.push(String(err && err.stack ? err.stack : err));
      }
      log(JSON.stringify(out, null, 2));
      window.__deltaTestResult = out;
      return out;
    };
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(function () { window.__runDeltaTest(); }, 50);
    });
  </script>
</body>
</html>
